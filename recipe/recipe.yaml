schema_version: 1

context:
  version: "9.8.1"

package:
  name: proj
  version: ${{ version }}

source:
  url: https://download.osgeo.org/proj/proj-${{ version }}.tar.gz
  sha256: af5b731c145c1d13c4e3b4eeb7d167e94e845e440f71e3496b4ed8dae0291960
  patches:
    - 0001-define_OLD_BUGGY_REMQUO.patch
    - 0002-sqlite-3.53.0-regression.patch

build:
  number: 0

requirements:
  build:
    - cmake
    - if: not win
      then: make
    - ${{ compiler('c') }}
    - ${{ compiler('cxx') }}
    - ${{ stdlib('c') }}
    - if: build_platform != target_platform
      then: sqlite
    - pytest
    - pyyaml
  host:
    - sqlite
    - libtiff
    - libcurl
  run:
    - sqlite
    - libtiff
    - libcurl
  run_exports:
    - ${{ pin_subpackage('proj', upper_bound='x.x') }}
  run_constraints:
    - proj4 ==999999999999

tests:
  - script:
      - if: unix
        then:
          - test -f ${PREFIX}/lib/libproj${SHLIB_EXT}
          - test ! -f ${PREFIX}/lib/libproj.a
      - if: win
        then: if not exist %LIBRARY_LIB%\\proj.lib exit 1

about:
  license: MIT
  license_file: COPYING
  summary: Cartographic Projections and Coordinate Transformations Library
  homepage: https://proj.org/

extra:
  recipe-maintainers:
    - hobu
    - msarahan
    - mwtoews
    - ocefpaf
    - pelson
    - snowman2
    - xylar
